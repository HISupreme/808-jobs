<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 808jobs.org Open Graph image — v2 (Hawaiʻi-as-it-is palette)
       1200x630 PNG-equivalent. Civic-broadsheet aesthetic.
       To convert to PNG: open in browser → screenshot, OR use online SVG-to-PNG converter
   -->

  <defs>
    <radialGradient id="warmTL" cx="0%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#0d4a64" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0d4a64" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmBR" cx="100%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#8a5d18" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8a5d18" stop-opacity="0"/>
    </radialGradient>

    <pattern id="rules" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <line x1="0" y1="23.5" x2="24" y2="23.5" stroke="#15110d" stroke-width="0.4" stroke-opacity="0.030"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#f1eadc"/>
  <rect width="1200" height="630" fill="url(#rules)"/>
  <rect width="1200" height="630" fill="url(#warmTL)"/>
  <rect width="1200" height="630" fill="url(#warmBR)"/>

  <!-- Top color stripe — the three palette accents (channel-water teal, kapa amber, ʻōhiʻa rust) -->
  <rect x="64" y="50" width="357" height="3" fill="#0d4a64"/>
  <rect x="421" y="50" width="357" height="3" fill="#8a5d18"/>
  <rect x="778" y="50" width="358" height="3" fill="#8e3221"/>

  <!-- Eyebrow -->
  <text x="64" y="42"
        font-family="'JetBrains Mono', monospace"
        font-size="13"
        font-weight="500"
        letter-spacing="2.5"
        fill="#6e6353">FREE PUBLIC TOOL · NO SIGNUP · APRIL 2026</text>

  <!-- Date stamp -->
  <text x="1136" y="42"
        text-anchor="end"
        font-family="'JetBrains Mono', monospace"
        font-size="13"
        font-weight="500"
        letter-spacing="2"
        fill="#6e6353">VERIFIED 27 APR 2026</text>

  <!-- Wordmark -->
  <text x="64" y="146"
        font-family="'Source Serif 4', Georgia, serif"
        font-size="68"
        font-weight="700"
        letter-spacing="-2"
        fill="#15110d">
    <tspan fill="#0d4a64" font-style="italic" font-weight="600">808</tspan><tspan>jobs</tspan>
  </text>

  <!-- Headline -->
  <text x="64" y="276"
        font-family="'Source Serif 4', Georgia, serif"
        font-size="76"
        font-weight="600"
        letter-spacing="-2.2"
        fill="#15110d">
    <tspan x="64" dy="0">Find a way into a trade</tspan>
    <tspan x="64" dy="88">in <tspan font-style="italic" fill="#0d4a64">Hawaiʻi</tspan>.</tspan>
  </text>

  <!-- Subhead -->
  <text x="64" y="488"
        font-family="'Source Serif 4', Georgia, serif"
        font-size="22"
        font-weight="400"
        fill="#2e2820">
    <tspan x="64" dy="0">Apprenticeship pathways with the dates we last checked.</tspan>
    <tspan x="64" dy="32" fill="#6e6353" font-size="20">Sister to 808housing.org.</tspan>
  </text>

  <!-- Bottom hairline + meta strip -->
  <line x1="64" y1="558" x2="1136" y2="558" stroke="#b8a982" stroke-width="1"/>

  <g font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="1.5">
    <text x="64" y="588" fill="#6e6353">5,390 ACTIVE APPRENTICES</text>
    <text x="64" y="608" fill="#6e6353" font-size="12">PER HI STATE APPRENTICESHIP COUNCIL</text>

    <text x="490" y="588" fill="#6e6353">70 PROGRAMS CATALOGUED</text>
    <text x="490" y="608" fill="#6e6353" font-size="12">CHOOSER-DRIVEN INTERFACE</text>

    <text x="1136" y="588" text-anchor="end" fill="#15110d" font-weight="700" font-size="16">808JOBS.ORG</text>
    <text x="1136" y="608" text-anchor="end" fill="#6e6353" font-size="12">FREE · NO SIGNUP · OPEN SOURCE</text>
  </g>
</svg>
